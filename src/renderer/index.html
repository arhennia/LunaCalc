<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LunaCalc</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div class="crt-overlay"></div>
    
    <!-- Cat Head (Drag Handle) -->
    <div class="cat-head" id="drag-handle">
      <div class="cat-ear left"></div>
      <div class="cat-ear right"></div>
      <div class="cat-eyes">
        <div class="cat-eye" id="eye-l"></div>
        <div class="cat-eye" id="eye-r"></div>
      </div>
    </div>

    <!-- Calculator Body -->
    <div class="calc-body">
      <!-- Display Area -->
      <div class="calc-display">
        <div class="expr" id="display-expr"></div>
        <div class="result" id="display-result">0</div>
      </div>

      <!-- Buttons Grid -->
      <div class="calc-buttons">
        <button class="calc-btn fn" data-key="AC">AC</button>
        <button class="calc-btn fn" data-key="pm">+/-</button>
        <button class="calc-btn fn" data-key="%">%</button>
        <button class="calc-btn op" data-key="/">÷</button>

        <button class="calc-btn" data-key="7">7</button>
        <button class="calc-btn" data-key="8">8</button>
        <button class="calc-btn" data-key="9">9</button>
        <button class="calc-btn op" data-key="*">×</button>

        <button class="calc-btn" data-key="4">4</button>
        <button class="calc-btn" data-key="5">5</button>
        <button class="calc-btn" data-key="6">6</button>
        <button class="calc-btn op" data-key="-">−</button>

        <button class="calc-btn" data-key="1">1</button>
        <button class="calc-btn" data-key="2">2</button>
        <button class="calc-btn" data-key="3">3</button>
        <button class="calc-btn op" data-key="+">+</button>

        <button class="calc-btn wide" data-key="0">0</button>
        <button class="calc-btn" data-key=".">.</button>
        <button class="calc-btn eq" data-key="=">=</button>
      </div>
    </div>

    <!-- Cat Tail -->
    <div class="cat-tail"></div>
  </div>

  <script src="js/calc.js"></script>
  <script src="js/luna.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/sounds.js"></script>
  <script>
    // Main initialization script
    document.addEventListener('DOMContentLoaded', () => {
      // Logic for button clicks, etc. will be wired up here or in specific scripts
    });
  </script>
</body>
</html>
